!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahana AI Chat Assistant - Call History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .drawer-overlay {
            transition: opacity 0.3s ease-in-out;
        }
        .drawer-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .waveform-bar {
            animation: wave 1.2s ease-in-out infinite;
        }
        .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(6) { animation-delay: 0.5s; }
        .waveform-bar:nth-child(7) { animation-delay: 0.6s; }
        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Sample Data
        const generateData = () => [
            {
                id: "exec_001",
                executionId: "exe_plivo_8f2a9c",
                userNumber: "+91 98765 43210",
                conversationType: "plivo outbound",
                duration: 72,
                hangupBy: "Plivo",
                batch: "Batch_001",
                timestamp: "2024-01-15T14:30:00Z",
                cost: 0.095,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_001",
                rawData: "raw_json_001"
            },
            {
                id: "exec_002",
                executionId: "exe_plivo_9b3d8e",
                userNumber: "+91 98765 12345",
                conversationType: "callee inbound",
                duration: 45,
                hangupBy: "Callee",
                batch: "Batch_001",
                timestamp: "2024-01-15T13:15:00Z",
                cost: 0.030,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_002",
                rawData: "raw_json_002"
            },
            {
                id: "exec_003",
                executionId: "exe_plivo_7c4f1a",
                userNumber: "+91 99887 76655",
                conversationType: "plivo outbound",
                duration: 128,
                hangupBy: "Plivo",
                batch: "Batch_002",
                timestamp: "2024-01-14T16:45:00Z",
                cost: 0.143,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_003",
                rawData: "raw_json_003"
            },
            {
                id: "exec_004",
                executionId: "exe_plivo_2d5e7b",
                userNumber: "+91 77665 54433",
                conversationType: "callee inbound",
                duration: 32,
                hangupBy: "Callee",
                batch: "Batch_002",
                timestamp: "2024-01-14T11:20:00Z",
                cost: 0.042,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_004",
                rawData: "raw_json_004"
            },
            {
                id: "exec_005",
                executionId: "exe_plivo_1a8f4c",
                userNumber: "+91 88990 01122",
                conversationType: "plivo outbound",
                duration: 95,
                hangupBy: "Plivo",
                batch: "Batch_003",
                timestamp: "2024-01-13T09:10:00Z",
                cost: 0.087,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_005",
                rawData: "raw_json_005"
            },
            {
                id: "exec_006",
                executionId: "exe_plivo_6g3h2j",
                userNumber: "+91 91234 56789",
                conversationType: "callee inbound",
                duration: 58,
                hangupBy: "Callee",
                batch: "Batch_003",
                timestamp: "2024-01-13T15:30:00Z",
                cost: 0.056,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_006",
                rawData: "raw_json_006"
            },
            {
                id: "exec_007",
                executionId: "exe_plivo_4k9l5m",
                userNumber: "+91 93456 78901",
                conversationType: "plivo outbound",
                duration: 112,
                hangupBy: "Plivo",
                batch: "Batch_004",
                timestamp: "2024-01-12T10:45:00Z",
                cost: 0.134,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_007",
                rawData: "raw_json_007"
            },
            {
                id: "exec_008",
                executionId: "exe_plivo_8n2p7q",
                userNumber: "+91 95678 90123",
                conversationType: "callee inbound",
                duration: 67,
                hangupBy: "Callee",
                batch: "Batch_004",
                timestamp: "2024-01-12T14:20:00Z",
                cost: 0.068,
                status: "Completed",
                conversationData: "Available",
                traceData: "trace_008",
                rawData: "raw_json_008"
            }
        ];

        // Status Badge Component
        const StatusBadge = ({ status }) => {
            if (status === "Completed") {
                return (
                    <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">
                        {status}
                    </span>
                );
            }
            return (
                <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                    {status}
                </span>
            );
        };

        // Search Bar Component
        const SearchBar = ({ value, onChange }) => {
            return (
                <div className="relative w-full max-w-md">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" className="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input
                        type="text"
                        placeholder="Search by execution id"
                        value={value}
                        onChange={(e) => onChange(e.target.value)}
                        className="block w-full pl-10 pr-3 py-2.5 border-none rounded-lg bg-gray-100 text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all duration-200 text-sm"
                    />
                </div>
            );
        };

        // Recording Card Component
        const RecordingCard = () => {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
                    <div className="flex justify-between items-start mb-3">
                        <h3 className="text-sm font-semibold text-gray-900">Recording</h3>
                        <div className="flex space-x-2">
                            <button className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors text-gray-500">
                                <i data-lucide="copy" className="h-4 w-4"></i>
                            </button>
                            <button className="p-1.5 hover:bg-gray-100 rounded-lg transition-colors text-gray-500">
                                <i data-lucide="download" className="h-4 w-4"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div className="flex items-center space-x-3">
                        <button className="flex-shrink-0 w-12 h-12 bg-blue-600 hover:bg-blue-700 rounded-full flex items-center justify-center text-white transition-colors shadow-md">
                            <i data-lucide="play" className="h-5 w-5 fill-current"></i>
                        </button>
                        
                        <div className="flex-1">
                            <div className="flex items-center justify-between text-xs text-gray-500 mb-1">
                                <span>0:00</span>
                                <span>1:12</span>
                            </div>
                            <div className="h-12 flex items-center justify-center space-x-1">
                                {[...Array(20)].map((_, i) => (
                                    <div 
                                        key={i} 
                                        className="waveform-bar w-1 bg-blue-300 rounded-full"
                                        style={{ 
                                            height: `${Math.random() * 60 + 20}%`,
                                            animationDelay: `${i * 0.05}s`
                                        }}
                                    ></div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Transcript Chat Component
        const TranscriptChat = () => {
            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                    <h3 className="text-sm font-semibold text-gray-900 mb-4">Transcript</h3>
                    
                    <div className="space-y-4">
                        {/* Assistant Message */}
                        <div className="flex items-start space-x-2">
                            <div className="flex-1 bg-gray-100 rounded-2xl rounded-tl-none px-4 py-3 max-w-[85%]">
                                <p className="text-sm text-gray-800 leading-relaxed">
                                    અમદાવાદ મ્યુનિસિપલ કોર્પોરેશન તરફથી નમસ્કાર,<br/>
                                    આપને તમારી મુશ્કેલીમાં કેવી રીતે મદદ કરી શકું?
                                </p>
                            </div>
                        </div>

                        {/* User Message */}
                        <div className="flex items-start justify-end space-x-2">
                            <div className="flex-1 bg-blue-50 rounded-2xl rounded-tr-none px-4 py-3 max-w-[85%] ml-auto">
                                <p className="text-sm text-gray-800 leading-relaxed text-right">
                                    આ રીતે છે.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Conversation Drawer Component
        const ConversationDrawer = ({ isOpen, onClose, data }) => {
            useEffect(() => {
                if (isOpen) {
                    lucide.createIcons();
                }
            }, [isOpen]);

            if (!data) return null;

            return (
                <>
                    {/* Overlay */}
                    <div 
                        className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-40 drawer-overlay ${isOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
                        onClick={onClose}
                    ></div>

                    {/* Drawer Panel */}
                    <div className={`fixed top-0 right-0 h-full w-full sm:w-[420px] bg-gray-50 z-50 shadow-2xl drawer-panel transform ${isOpen ? 'translate-x-0' : 'translate-x-full'} overflow-y-auto scrollbar-hide`}>
                        {/* Header */}
                        <div className="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between z-10">
                            <div className="flex items-center space-x-2">
                                <h2 className="text-lg font-semibold text-gray-900">Conversation data</h2>
                            </div>
                            <div className="flex items-center space-x-3">
                                <div className="flex items-center space-x-2 text-sm text-gray-600 bg-gray-100 px-3 py-1.5 rounded-lg">
                                    <span className="font-medium">{data.executionId}</span>
                                    <button className="hover:text-blue-600 transition-colors">
                                        <i data-lucide="copy" className="h-4 w-4"></i>
                                    </button>
                                </div>
                                <button 
                                    onClick={onClose}
                                    className="p-2 hover:bg-gray-100 rounded-lg transition-colors text-gray-500"
                                >
                                    <i data-lucide="x" className="h-5 w-5"></i>
                                </button>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="p-6">
                            <RecordingCard />
                            <TranscriptChat />
                        </div>
                    </div>
                </>
            );
        };

        // Call Table Component
        const CallTable = ({ data, sortConfig, onSort, onOpenConversation }) => {
            const getSortIcon = (column) => {
                if (sortConfig.key !== column) return <i data-lucide="arrow-up-down" className="h-3.5 w-3.5 text-gray-400 ml-1"></i>;
                return sortConfig.direction === 'asc' ? 
                    <i data-lucide="arrow-up" className="h-3.5 w-3.5 text-blue-600 ml-1"></i> : 
                    <i data-lucide="arrow-down" className="h-3.5 w-3.5 text-blue-600 ml-1"></i>;
            };

            const SortableHeader = ({ column, children }) => {
                const isSortable = ['duration', 'timestamp', 'cost'].includes(column);
                return (
                    <th 
                        className={`px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider ${isSortable ? 'cursor-pointer hover:bg-gray-200 transition-colors' : ''}`}
                        onClick={() => isSortable && onSort(column)}
                    >
                        <div className="flex items-center">
                            {children}
                            {isSortable && getSortIcon(column)}
                        </div>
                    </th>
                );
            };

            return (
                <div className="overflow-x-auto scrollbar-hide border border-gray-200 rounded-lg">
                    <table className="min-w-full divide-y divide-gray-200 bg-white">
                        <thead className="bg-gray-100 sticky top-0 z-10">
                            <tr>
                                <SortableHeader column="executionId">Execution ID</SortableHeader>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">User Number</th>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Conversation Type</th>
                                <SortableHeader column="duration">Duration (s)</SortableHeader>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Hangup By</th>
                                <SortableHeader column="timestamp">Timestamp</SortableHeader>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Conversation Data</th>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Trace Data</th>
                                <th className="px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Raw Data</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                            {data.map((row) => (
                                <tr key={row.id} className="hover:bg-gray-50 transition-colors duration-150 group">
                                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 font-mono">
                                        {row.executionId}
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
                                        {row.userNumber}
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700 capitalize">
                                        {row.conversationType}
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
                                        {row.duration}
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
                                        {row.hangupBy}
                                    </td>

                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-700">
                                        {new Date(row.timestamp).toLocaleString('en-IN', { 
                                            day: '2-digit', 
                                            month: 'short', 
                                            year: 'numeric',
                                            hour: '2-digit',
                                            minute: '2-digit'
                                        })}
                                    </td>

                                    <td className="px-6 py-4 whitespace-nowrap">
                                        <StatusBadge status={row.status} />
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap">
                                        <button 
                                            onClick={() => onOpenConversation(row)}
                                            className="inline-flex flex-col items-start px-3 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs rounded-lg transition-all duration-200 group/btn"
                                        >
                                            <span className="font-semibold flex items-center">
                                                Recordings
                                                <i data-lucide="external-link" className="h-3 w-3 ml-1 opacity-0 group-hover/btn:opacity-100 transition-opacity"></i>
                                            </span>
                                            <span className="text-blue-600/80 text-[10px]">transcripts, etc</span>
                                        </button>
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono text-xs">
                                        {row.traceData}
                                    </td>
                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-mono text-xs">
                                        {row.rawData}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        // Main Page Component
        const CallHistoryPage = () => {
            const [searchQuery, setSearchQuery] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            const [currentPage, setCurrentPage] = useState(1);
            const [rowsPerPage, setRowsPerPage] = useState(5);
            const [selectedConversation, setSelectedConversation] = useState(null);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false);
            
            const rawData = useMemo(() => generateData(), []);

            // Filter and Sort Data
            const processedData = useMemo(() => {
                let data = [...rawData];

                // Search
                if (searchQuery) {
                    data = data.filter(row => 
                        row.executionId.toLowerCase().includes(searchQuery.toLowerCase())
                    );
                }

                // Sort
                if (sortConfig.key) {
                    data.sort((a, b) => {
                        if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }

                return data;
            }, [rawData, searchQuery, sortConfig]);

            // Pagination
            const totalPages = Math.ceil(processedData.length / rowsPerPage);
            const paginatedData = processedData.slice(
                (currentPage - 1) * rowsPerPage,
                currentPage * rowsPerPage
            );

            const handleSort = (key) => {
                setSortConfig(current => ({
                    key,
                    direction: current.key === key && current.direction === 'asc' ? 'desc' : 'asc'
                }));
            };

            const handleOpenConversation = (data) => {
                setSelectedConversation(data);
                setIsDrawerOpen(true);
            };

            const handleCloseDrawer = () => {
                setIsDrawerOpen(false);
                setTimeout(() => setSelectedConversation(null), 300);
            };

            useEffect(() => {
                lucide.createIcons();
            }, [paginatedData, sortConfig, isDrawerOpen]);

            return (
                <div className="min-h-screen bg-gray-50/50">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-30">
                        <div className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between py-4 space-y-4 sm:space-y-0">
                                <div className="flex flex-col space-y-3">
                                    <h1 className="text-2xl font-bold text-gray-900 tracking-tight">
                                        Sahana AI Chat Assistant
                                    </h1>
                                    <SearchBar value={searchQuery} onChange={setSearchQuery} />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6">
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <CallTable 
                                data={paginatedData} 
                                sortConfig={sortConfig}
                                onSort={handleSort}
                                onOpenConversation={handleOpenConversation}
                            />
                            
                            {/* Pagination */}
                            <div className="bg-white border-t border-gray-200 px-6 py-4 flex items-center justify-between">
                                <div className="flex items-center space-x-2 text-sm text-gray-600">
                                    <span>Rows per page:</span>
                                    <select 
                                        value={rowsPerPage}
                                        onChange={(e) => {
                                            setRowsPerPage(Number(e.target.value));
                                            setCurrentPage(1);
                                        }}
                                        className="form-select rounded-lg border-gray-300 text-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50 py-1.5 pl-3 pr-8"
                                    >
                                        <option value={5}>5</option>
                                        <option value={10}>10</option>
                                        <option value={20}>20</option>
                                    </select>
                                    <span className="ml-4">
                                        Showing {(currentPage - 1) * rowsPerPage + 1} to {Math.min(currentPage * rowsPerPage, processedData.length)} of {processedData.length} entries
                                    </span>
                                </div>

                                <div className="flex items-center space-x-2">
                                    <button
                                        onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                                        disabled={currentPage === 1}
                                        className="p-2 rounded-lg hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                                    >
                                        <i data-lucide="chevron-left" className="h-5 w-5 text-gray-600"></i>
                                    </button>
                                    
                                    <div className="flex space-x-1">
                                        {[...Array(totalPages)].map((_, i) => (
                                            <button
                                                key={i}
                                                onClick={() => setCurrentPage(i + 1)}
                                                className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${
                                                    currentPage === i + 1 
                                                        ? 'bg-blue-600 text-white' 
                                                        : 'hover:bg-gray-100 text-gray-700'
                                                }`}
                                            >
                                                {i + 1}
                                            </button>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                                        disabled={currentPage === totalPages}
                                        className="p-2 rounded-lg hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                                    >
                                        <i data-lucide="chevron-right" className="h-5 w-5 text-gray-600"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Conversation Drawer */}
                    <ConversationDrawer 
                        isOpen={isDrawerOpen}
                        onClose={handleCloseDrawer}
                        data={selectedConversation}
                    />
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CallHistoryPage />);
    </script>
</body>
</html>
